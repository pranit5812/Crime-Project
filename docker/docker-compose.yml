version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: crime_dashboard
      POSTGRES_USER: crime
      POSTGRES_PASSWORD: crimepass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql+psycopg://crime:crimepass@postgres:5432/crime_dashboard
    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

  openenv:
    build:
      context: ../openenv
      dockerfile: Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    command: ["python", "baseline.py"]

volumes:
  postgres_data:
